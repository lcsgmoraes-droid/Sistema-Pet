add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;

location ^~ /uploads/produtos/ {
    alias /app/uploads/produtos/;
    expires 7d;
    add_header Cache-Control "public";
    add_header Access-Control-Allow-Origin "*";
}

location ^~ /uploads/ecommerce/ {
    alias /app/uploads/ecommerce/;
    expires 7d;
    add_header Cache-Control "public";
    add_header Access-Control-Allow-Origin "*";
}

location ^~ /uploads/pets/ {
    alias /app/uploads/pets/;
    expires 7d;
    add_header Cache-Control "public";
    add_header Access-Control-Allow-Origin "*";
}

location ^~ /uploads/banho_tosa/ {
    alias /app/uploads/banho_tosa/;
    expires 7d;
    add_header Cache-Control "public";
    add_header Access-Control-Allow-Origin "*";
}

location ^~ /uploads/ {
    return 404;
}

location = /api/health/watchdog {
    return 404;
}

location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;

    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }
}

location /auth/bling/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $client_ip;
    proxy_set_header X-Forwarded-For $client_ip;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api/ws/ {
    rewrite ^/api(.*)$ $1 break;
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $client_ip;
    proxy_set_header X-Forwarded-For $client_ip;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;
}

location /api {
    limit_req zone=api_limit burst=20 nodelay;

    rewrite ^/api(.*)$ $1 break;
    proxy_pass http://backend;
    proxy_http_version 1.1;

    proxy_redirect http://localhost:8000/ https://$http_host/api/;
    proxy_redirect http://backend:8000/ https://$http_host/api/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $client_ip;
    proxy_set_header X-Forwarded-For $client_ip;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    client_max_body_size 50M;
}

location /api/auth/login {
    limit_req zone=login_limit burst=5 nodelay;

    rewrite ^/api(.*)$ $1 break;
    proxy_pass http://backend;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $client_ip;
    proxy_set_header X-Forwarded-For $client_ip;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}

location /api/health {
    access_log off;
    rewrite ^/api(.*)$ $1 break;
    proxy_pass http://backend;
}
