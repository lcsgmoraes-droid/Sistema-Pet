user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;
    server_tokens off;

    geo $from_cloudflare {
        default 0;
        173.245.48.0/20 1;
        103.21.244.0/22 1;
        103.22.200.0/22 1;
        103.31.4.0/22 1;
        141.101.64.0/18 1;
        108.162.192.0/18 1;
        190.93.240.0/20 1;
        188.114.96.0/20 1;
        197.234.240.0/22 1;
        198.41.128.0/17 1;
        162.158.0.0/15 1;
        104.16.0.0/13 1;
        104.24.0.0/14 1;
        172.64.0.0/13 1;
        131.0.72.0/22 1;
        2400:cb00::/32 1;
        2606:4700::/32 1;
        2803:f800::/32 1;
        2405:b500::/32 1;
        2405:8100::/32 1;
        2a06:98c0::/29 1;
        2c0f:f248::/32 1;
    }

    # So aceite o IP informado pela Cloudflare quando a conexao realmente
    # veio de uma faixa oficial. Conexoes diretas nao podem escolher o IP
    # usado em logs, auditoria e rate limit.
    map "$from_cloudflare:$http_cf_connecting_ip" $client_ip {
        ~^1:(.+)$ $1;
        default $remote_addr;
    }

    log_format main '$client_ip - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json;

    # O limite deve ser por cliente final. Usar $binary_remote_addr aqui
    # agruparia todos os usuarios que chegassem pela mesma borda Cloudflare.
    limit_req_zone $client_ip zone=api_limit:10m rate=10r/s;
    limit_req_zone $client_ip zone=login_limit:10m rate=5r/m;

    upstream backend {
        server backend:8000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name mlprohub.com.br www.mlprohub.com.br;

        include /etc/nginx/includes/cloudflare-allowlist.conf;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name corepet.com.br www.corepet.com.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name img.corepet.com.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name mlprohub.com.br www.mlprohub.com.br;

        include /etc/nginx/includes/cloudflare-allowlist.conf;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        include /etc/nginx/includes/ssl-settings.conf;
        include /etc/nginx/includes/app-server-locations.conf;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name corepet.com.br www.corepet.com.br;

        ssl_certificate /etc/nginx/ssl/corepet/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/corepet/privkey.pem;

        include /etc/nginx/includes/ssl-settings.conf;
        include /etc/nginx/includes/app-server-locations.conf;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name img.corepet.com.br;

        ssl_certificate /etc/nginx/ssl/corepet-img/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/corepet-img/privkey.pem;

        include /etc/nginx/includes/ssl-settings.conf;
        include /etc/nginx/includes/product-image-server-locations.conf;
    }
}
