<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/brand/corepet/corepet-icon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/brand/corepet/corepet-icon-192.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/brand/corepet/corepet-icon-180.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CorePet centraliza a gestao do petshop com PDV, estoque, financeiro, e-commerce, entregas e modulo veterinario."
    />
    <meta name="theme-color" content="#0f5f63" />
    <script>
      (function () {
        try {
          var storedTheme = window.localStorage.getItem("corepet_theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : prefersDark ? "dark" : "light";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <title>CorePet - Sistema de Gestao Integrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Google Analytics 4 -->
    <!-- Troque G-XXXXXXXXXX pelo seu ID real quando criar a conta no analytics.google.com -->
    <script>
      (function () {
        var id = "%VITE_GA_MEASUREMENT_ID%";
        if (
          !id ||
          id === "%VITE_GA_MEASUREMENT_ID%" ||
          !id.startsWith("G-")
        )
          return;
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + id;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () {
          window.dataLayer.push(arguments);
        };
        window.gtag("js", new Date());
        window.gtag("config", id, { send_page_view: false });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
