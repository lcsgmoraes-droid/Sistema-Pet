version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/mcp/frontend_react_server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "mcp"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      mcp-frontend-python:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/mcp/ops_api_server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:15"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "mcp"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      mcp-ops-python:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore"
      include: "scope"
