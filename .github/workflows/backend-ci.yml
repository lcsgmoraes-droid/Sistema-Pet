name: Backend CI - Multitenant Safety

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    name: Tests & Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    env:
      DEBUG: "false"
      ENVIRONMENT: testing
      DATABASE_URL: sqlite:///./test.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c requirements.lock
          pip install pytest pytest-cov pytest-asyncio ruff==0.15.12 mypy pip-audit

      - name: Python dependency audit (blocking)
        run: |
          pip-audit -r requirements.lock -s osv --progress-spinner off --timeout 60

      - name: Alembic env lint (blocking)
        run: |
          ruff check alembic/env.py

      - name: Tenancy lint (blocking)
        run: |
          ruff check app/tenancy tests/unit/test_rls_no_debt_guard.py tests/multi_tenant/test_tenant_model_registry.py

      - name: Auth lint (blocking)
        run: |
          ruff check app/auth app/auth_routes_multitenant.py app/usuarios_routes.py

      - name: Database lint (blocking)
        run: |
          ruff check app/db

      - name: Schemas lint (blocking)
        run: |
          ruff check app/schemas

      - name: Security lint (blocking)
        run: |
          ruff check app/security

      - name: Core lint (blocking)
        run: |
          ruff check app/core

      - name: Events lint (blocking)
        run: |
          ruff check app/events

      - name: Utils lint (blocking)
        run: |
          ruff check app/utils

      - name: Constants lint (blocking)
        run: |
          ruff check app/constants

      - name: Cache lint (blocking)
        run: |
          ruff check app/cache

      - name: Replay lint (blocking)
        run: |
          ruff check app/replay

      - name: Application lint (blocking)
        run: |
          ruff check app/application

      - name: Analytics lint (blocking)
        run: |
          ruff check app/analytics

      - name: AI lint (blocking)
        run: |
          ruff check app/ai

      - name: AI Core lint (blocking)
        run: |
          ruff check app/ai_core

      - name: Fiscal models lint (blocking)
        run: |
          ruff check app/fiscal_models

      - name: Caixa lint (blocking)
        run: |
          ruff check app/caixa

      - name: Caixa root lint (blocking)
        run: |
          ruff check app/caixa_models.py app/caixa_routes.py app/calculadora_racao.py

      - name: Racoes root lint (blocking)
