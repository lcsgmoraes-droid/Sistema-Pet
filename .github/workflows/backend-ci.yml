name: Backend CI - Multitenant Safety

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    name: Tests & Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    env:
      DEBUG: "false"
      ENVIRONMENT: testing
      DATABASE_URL: sqlite:///./test.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff mypy

      - name: Lint (non-blocking)
        run: |
          ruff check app/ tests/multi_tenant || echo "Lint warnings found"

      - name: Type check (non-blocking)
        run: |
          mypy app/ --ignore-missing-imports || echo "Type warnings found"
        continue-on-error: true

      - name: Multitenant hardening suite
        run: |
          pytest tests/multi_tenant -q --cov=app --cov-report=term --cov-report=xml

      - name: Import smoke test
        run: |
          python -c "import app.main; print('main import ok')"

      - name: Coverage report (informational)
        run: |
          coverage report --fail-under=70 || echo "Coverage below 70%; informational only for this hardening PR"

  quality-gate:
    name: Quality Gate
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: All required checks passed
        run: |
          echo "Multitenant safety suite passed"
          echo "Startup import passed"
