name: Backend CI - Multitenant Safety

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    name: Tests & Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    env:
      DEBUG: "false"
      ENVIRONMENT: testing
      DATABASE_URL: sqlite:///./test.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff mypy

      - name: Tenancy lint (blocking)
        run: |
          ruff check app/tenancy tests/unit/test_rls_no_debt_guard.py tests/multi_tenant/test_tenant_model_registry.py

      - name: Auth lint (blocking)
        run: |
          ruff check app/auth app/auth_routes_multitenant.py app/usuarios_routes.py

      - name: Database lint (blocking)
        run: |
          ruff check app/db

      - name: Schemas lint (blocking)
        run: |
          ruff check app/schemas

      - name: Security lint (blocking)
        run: |
          ruff check app/security

      - name: Core lint (blocking)
        run: |
          ruff check app/core

      - name: Events lint (blocking)
        run: |
          ruff check app/events

      - name: Lint (non-blocking)
        run: |
          ruff check app/ tests/multi_tenant || echo "Lint warnings found"

      - name: Type check (non-blocking)
        run: |
          mypy app/ --ignore-missing-imports || echo "Type warnings found"
        continue-on-error: true

      - name: Multitenant hardening suite
        run: |
          pytest tests/multi_tenant -q --cov=app --cov-report=term --cov-report=xml

      - name: Import smoke test
        run: |
          python -c "import app.main; print('main import ok')"

      - name: Coverage report (informational)
        run: |
          coverage report --fail-under=70 || echo "Coverage below 70%; informational only for this hardening PR"

  migration-smoke:
    name: Migration Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: petshop_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d petshop_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/petshop_ci
      DEBUG: "false"
      ENVIRONMENT: testing
      JWT_SECRET_KEY: migration-smoke-secret-key-with-more-than-32-characters
      EMAIL_VERIFICATION_REQUIRED: "false"
      BLING_SYNC_SCHEDULER_ENABLED: "false"
      SEFAZ_IMPORTACAO_AUTOMATICA: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Alembic migration smoke
        run: python scripts/ci_migration_smoke.py

  quality-gate:
    name: Quality Gate
    needs: [tests, migration-smoke]
    runs-on: ubuntu-latest

    steps:
      - name: All required checks passed
        run: |
          echo "Multitenant safety suite passed"
          echo "Startup import passed"
          echo "Migration smoke passed"
