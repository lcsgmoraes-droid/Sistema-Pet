name: Backend CI - Multitenant Safety

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    name: Tests & Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    env:
      DEBUG: "false"
      ENVIRONMENT: testing
      DATABASE_URL: sqlite:///./test.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff mypy

      - name: Tenancy lint (blocking)
        run: |
          ruff check app/tenancy tests/unit/test_rls_no_debt_guard.py tests/multi_tenant/test_tenant_model_registry.py

      - name: Auth lint (blocking)
        run: |
          ruff check app/auth app/auth_routes_multitenant.py app/usuarios_routes.py

      - name: Database lint (blocking)
        run: |
          ruff check app/db

      - name: Schemas lint (blocking)
        run: |
          ruff check app/schemas

      - name: Security lint (blocking)
        run: |
          ruff check app/security

      - name: Core lint (blocking)
        run: |
          ruff check app/core

      - name: Events lint (blocking)
        run: |
          ruff check app/events

      - name: Utils lint (blocking)
        run: |
          ruff check app/utils

      - name: Constants lint (blocking)
        run: |
          ruff check app/constants

      - name: Cache lint (blocking)
        run: |
          ruff check app/cache

      - name: Replay lint (blocking)
        run: |
          ruff check app/replay

      - name: Application lint (blocking)
        run: |
          ruff check app/application

      - name: Analytics lint (blocking)
        run: |
          ruff check app/analytics

      - name: Fiscal models lint (blocking)
        run: |
          ruff check app/fiscal_models

      - name: Caixa lint (blocking)
        run: |
          ruff check app/caixa

      - name: Parsers lint (blocking)
        run: |
          ruff check app/parsers

      - name: Scripts lint (blocking)
        run: |
          ruff check app/scripts

      - name: Middlewares lint (blocking)
        run: |
          ruff check app/middlewares

      - name: Notas entrada lint (blocking)
        run: |
          ruff check app/notas_entrada

      - name: Produtos lint (blocking)
        run: |
          ruff check app/produtos

      - name: Insights lint (blocking)
        run: |
          ruff check app/insights

      - name: Schedulers lint (blocking)
        run: |
          ruff check app/schedulers

      - name: Audit lint (blocking)
        run: |
          ruff check app/audit

      - name: Financeiro lint (blocking)
        run: |
          ruff check app/financeiro

      - name: Routers lint (blocking)
        run: |
          ruff check app/routers

      - name: Domain lint (blocking)
        run: |
          ruff check app/domain

      - name: Read models lint (blocking)
        run: |
          ruff check app/read_models

      - name: Banho Tosa API lint (blocking)
        run: |
          ruff check app/banho_tosa_api

      - name: Estoque lint (blocking)
        run: |
          ruff check app/estoque

      - name: Configuracoes lint (blocking)
        run: |
          ruff check app/configuracoes

      - name: Database package lint (blocking)
        run: |
          ruff check app/database

      - name: DRE lint (blocking)
        run: |
          ruff check app/dre

      - name: Migrations lint (blocking)
        run: |
          ruff check app/migrations

      - name: Banho Tosa model parts lint (blocking)
        run: |
          ruff check app/banho_tosa_model_parts

      - name: Banho Tosa schema parts lint (blocking)
        run: |
          ruff check app/banho_tosa_schema_parts

      - name: Services lint (blocking)
        run: |
          ruff check app/services

      - name: Campaigns lint (blocking)
        run: |
          ruff check app/campaigns

      - name: Vendas lint (blocking)
        run: |
          ruff check app/vendas

      - name: WhatsApp lint (blocking)
        run: |
          ruff check app/whatsapp

      - name: API lint (blocking)
        run: |
          ruff check app/api

      - name: Routes lint (blocking)
        run: |
          ruff check app/routes

      - name: Bling root lint (blocking)
        run: |
          ruff check app/bling_estoque_sync.py app/bling_flow_monitor_models.py app/bling_flow_monitor_routes.py app/bling_integration.py app/bling_oauth_routes.py app/bling_pedido_webhook_queue_models.py app/bling_routes.py app/bling_sync_routes.py app/integracao_bling_models.py app/integracao_bling_nf_routes.py app/integracao_bling_pedido_routes.py app/integracao_bling_webhook_routes.py

      - name: Operational root lint (blocking)
        run: |
          ruff check app/health_router.py app/session_manager.py app/idempotency.py app/idempotency_models.py app/encryption.py app/audit.py app/audit_log.py

      - name: Empresa root lint (blocking)
        run: |
          ruff check app/empresa_routes.py app/empresa_config_routes.py app/empresa_config_fiscal_models.py app/empresa_config_geral_models.py app/config.py app/constants.py

      - name: Access root lint (blocking)
        run: |
          ruff check app/canais.py app/partner_utils.py app/permissions_routes.py app/roles_routes.py app/cargos_routes.py app/cargo_models.py

      - name: Lint (non-blocking)
        run: |
          ruff check app/ tests/multi_tenant || echo "Lint warnings found"

      - name: Type check (non-blocking)
        run: |
          mypy app/ --ignore-missing-imports || echo "Type warnings found"
        continue-on-error: true

      - name: Multitenant hardening suite
        run: |
          pytest tests/multi_tenant -q --cov=app --cov-report=term --cov-report=xml

      - name: Import smoke test
        run: |
          python -c "import app.main; print('main import ok')"

      - name: Coverage report (informational)
        run: |
          coverage report --fail-under=70 || echo "Coverage below 70%; informational only for this hardening PR"

  migration-smoke:
    name: Migration Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: petshop_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d petshop_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/petshop_ci
      DEBUG: "false"
      ENVIRONMENT: testing
      JWT_SECRET_KEY: migration-smoke-secret-key-with-more-than-32-characters
      EMAIL_VERIFICATION_REQUIRED: "false"
      BLING_SYNC_SCHEDULER_ENABLED: "false"
      SEFAZ_IMPORTACAO_AUTOMATICA: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Alembic migration smoke
        run: python scripts/ci_migration_smoke.py

  quality-gate:
    name: Quality Gate
    needs: [tests, migration-smoke]
    runs-on: ubuntu-latest

    steps:
      - name: All required checks passed
        run: |
          echo "Multitenant safety suite passed"
          echo "Startup import passed"
          echo "Migration smoke passed"
