      - name: Database package lint (blocking)
        run: |
          ruff check app/database

      - name: DRE lint (blocking)
        run: |
          ruff check app/dre

      - name: DRE root lint (blocking)
        run: |
          ruff check app/dre_canais_routes.py app/dre_classificacao_routes.py app/dre_classificacao_service.py app/dre_ia_routes.py app/dre_plano_contas_models.py app/dre_plano_contas_routes.py app/dre_regras_models.py app/dre_routes.py

      - name: Migrations lint (blocking)
        run: |
          ruff check app/migrations

      - name: Banho Tosa model parts lint (blocking)
        run: |
          ruff check app/banho_tosa_model_parts

      - name: Banho Tosa schema parts lint (blocking)
        run: |
          ruff check app/banho_tosa_schema_parts

      - name: Services lint (blocking)
        run: |
          ruff check app/services

      - name: Campaigns lint (blocking)
        run: |
          ruff check app/campaigns

      - name: Vendas lint (blocking)
        run: |
          ruff check app/vendas

      - name: WhatsApp lint (blocking)
        run: |
          ruff check app/whatsapp

      - name: IA lint (blocking)
        run: |
          ruff check app/ia

      - name: IA root lint (blocking)
        run: |
          ruff check app/ia_config.py app/ia_fluxo_routes.py app/ia_routes.py

      - name: PDV dashboard root lint (blocking)
        run: |
          ruff check app/dashboard_routes.py app/pdv_ai_routes.py app/pdv_indicadores_routes.py

      - name: API lint (blocking)
        run: |
          ruff check app/api

      - name: Routes lint (blocking)
        run: |
          ruff check app/routes

      - name: Bling root lint (blocking)
        run: |
          ruff check app/bling_estoque_sync.py app/bling_flow_monitor_models.py app/bling_flow_monitor_routes.py app/bling_integration.py app/bling_oauth_routes.py app/bling_pedido_webhook_queue_models.py app/bling_routes.py app/bling_sync_routes.py app/integracao_bling_models.py app/integracao_bling_nf_routes.py app/integracao_bling_pedido_routes.py app/integracao_bling_webhook_routes.py

      - name: Operational root lint (blocking)
        run: |
          ruff check app/health_router.py app/session_manager.py app/idempotency.py app/idempotency_models.py app/encryption.py app/audit.py app/audit_log.py

      - name: Main root lint (blocking)
        run: |
          ruff check app/main.py

      - name: Clientes root lint (blocking)
        run: |
          ruff check app/clientes_routes.py app/cliente_info_pdv.py app/pets_routes.py app/cadastros_routes.py app/importacao_pessoas.py

      - name: Cadastros operacionais root lint (blocking)
        run: |
          ruff check app/fornecedor_grupos_routes.py app/funcionarios_routes.py app/tipo_despesa_routes.py app/tributacao_routes.py app/variacoes_routes.py

      - name: Empresa root lint (blocking)
        run: |
          ruff check app/empresa_routes.py app/empresa_config_routes.py app/empresa_config_fiscal_models.py app/empresa_config_geral_models.py app/config.py app/constants.py

      - name: Access root lint (blocking)
        run: |
          ruff check app/canais.py app/partner_utils.py app/permissions_routes.py app/roles_routes.py app/cargos_routes.py app/cargo_models.py

      - name: Financial root lint (blocking)
        run: |
          ruff check app/financeiro_models.py app/contas_bancarias_routes.py app/contas_pagar_routes.py app/contas_receber_routes.py app/lancamentos_routes.py app/operadoras_models.py app/operadoras_routes.py app/formas_pagamento_models.py app/formas_pagamento_routes.py

      - name: Estoque root lint (blocking)
        run: |
          ruff check app/estoque_alertas_gerais_routes.py app/estoque_alertas_routes.py app/estoque_entrada_manual_routes.py app/estoque_granel_routes.py app/estoque_importacao_csv_routes.py app/estoque_importacao_pdf_routes.py app/estoque_local_models.py app/estoque_models.py app/estoque_movimentacoes_consulta_routes.py app/estoque_movimentacoes_context.py app/estoque_movimentacoes_edicao_routes.py app/estoque_movimentacoes_manuais_routes.py app/estoque_relatorios_routes.py app/estoque_reserva_service.py app/estoque_routes.py app/estoque_saida_full_routes.py app/estoque_saida_manual_routes.py app/estoque_transferencia_parceiro_routes.py app/estoque_transferencia_routes.py app/estoque_transferencia_service.py app/estoque_validade_models.py app/estoque_validade_routes.py app/estoque_validade_service.py

      - name: Comissoes root lint (blocking)
        run: |
          ruff check app/comissoes_avancadas_models.py app/comissoes_avancadas_routes.py app/comissoes_demonstrativo_routes.py app/comissoes_diagnostico_routes.py app/comissoes_estorno.py app/comissoes_models.py app/comissoes_provisao.py app/comissoes_routes.py app/comissoes_service.py

      - name: Veterinario root lint (blocking)
        run: |
          ruff check app/veterinario_acompanhamento_routes.py app/veterinario_agenda_routes.py app/veterinario_agendamentos.py app/veterinario_calendar.py app/veterinario_catalogo_routes.py app/veterinario_clinico.py app/veterinario_consultas_routes.py app/veterinario_core.py app/veterinario_exames_arquivos.py app/veterinario_exames_ia.py app/veterinario_exames_routes.py app/veterinario_extratos.py app/veterinario_extratos_routes.py app/veterinario_financeiro.py app/veterinario_ia.py app/veterinario_ia_routes.py app/veterinario_internacao.py app/veterinario_internacao_routes.py app/veterinario_models.py app/veterinario_orcamentos.py app/veterinario_orcamentos_routes.py app/veterinario_parcerias_routes.py app/veterinario_preventivo.py app/veterinario_relatorios_routes.py app/veterinario_routes.py app/veterinario_schemas.py app/veterinario_serializers.py app/pdf_veterinario.py

      - name: Residual app root lint (blocking)
        run: |
          ruff check app/auditoria_provisoes_routes.py app/auth_routes.py app/chat_routes.py app/criar_tabelas_formas_pagamento.py app/lembretes.py app/models.py app/pdf_caixa.py app/projecao_caixa_routes.py app/relatorio_vendas_routes.py app/rotas_entrega_models.py app/simulacao_contratacao_routes.py app/template_models.py app/vendas_models.py

      - name: Multi tenant tests lint (blocking)
        run: |
          ruff check tests/multi_tenant

      - name: Unit tests lint (blocking)
        run: |
          ruff check tests/unit

      - name: Domain integration tests lint (blocking)
        run: |
          ruff check tests/domain tests/integration

      - name: Backend tests lint (blocking)
        run: |
          ruff check tests

      - name: Lint (non-blocking)
        run: |
          ruff check app/ tests/multi_tenant || echo "Lint warnings found"

      - name: Type check (non-blocking)
        run: |
          mypy app/ --ignore-missing-imports || echo "Type warnings found"
        continue-on-error: true

      - name: Multitenant hardening suite
        run: |
          pytest tests/multi_tenant -q --cov=app --cov-report=term --cov-report=xml

      - name: Import smoke test
        run: |
          python -c "import app.main; print('main import ok')"

      - name: Coverage report (informational)
        run: |
          coverage report --fail-under=70 || echo "Coverage below 70%; informational only for this hardening PR"

  migration-smoke:
    name: Migration Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: petshop_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d petshop_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/petshop_ci
      DEBUG: "false"
      ENVIRONMENT: testing
      JWT_SECRET_KEY: migration-smoke-secret-key-with-more-than-32-characters
      EMAIL_VERIFICATION_REQUIRED: "false"
      BLING_SYNC_SCHEDULER_ENABLED: "false"
      SEFAZ_IMPORTACAO_AUTOMATICA: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Alembic migration smoke
        run: python scripts/ci_migration_smoke.py

  quality-gate:
    name: Quality Gate
    needs: [tests, migration-smoke]
    runs-on: ubuntu-latest

    steps:
      - name: All required checks passed
        run: |
          echo "Multitenant safety suite passed"
          echo "Startup import passed"
          echo "Migration smoke passed"
