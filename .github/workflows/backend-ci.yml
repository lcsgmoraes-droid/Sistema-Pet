        run: |
          ruff format --check tests/unit

      - name: Backend tests format (blocking)
        run: |
          ruff format --check ../tests tests

      - name: Backend migrations format (blocking)
        run: |
          ruff format --check migrations

      - name: Backend global format (blocking)
        run: |
          ruff format --check . \
            --exclude alembic/versions

      - name: Lint (non-blocking)
        run: |
          ruff check app/ tests/multi_tenant || echo "Lint warnings found"

      - name: Type check (non-blocking)
        run: |
          mypy app/ --ignore-missing-imports || echo "Type warnings found"
        continue-on-error: true

      - name: Multitenant hardening suite
        run: |
          pytest tests/multi_tenant -q --cov=app --cov-report=term --cov-report=xml

      - name: Import smoke test
        run: |
          python -c "import app.main; print('main import ok')"

      - name: Coverage report (informational)
        run: |
          coverage report --fail-under=70 || echo "Coverage below 70%; informational only for this hardening PR"

  migration-smoke:
    name: Migration Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: petshop_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d petshop_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/petshop_ci
      DEBUG: "false"
      ENVIRONMENT: testing
      JWT_SECRET_KEY: migration-smoke-secret-key-with-more-than-32-characters
      EMAIL_VERIFICATION_REQUIRED: "false"
      BLING_SYNC_SCHEDULER_ENABLED: "false"
      SEFAZ_IMPORTACAO_AUTOMATICA: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -c backend/requirements.lock

      - name: Run Alembic migration smoke
        run: python scripts/ci_migration_smoke.py

  quality-gate:
    name: Quality Gate
    needs: [tests, migration-smoke]
    runs-on: ubuntu-latest

    steps:
      - name: All required backend checks passed
        run: |
          echo "Operational backend checks passed"
          echo "Tests & Quality passed"
          echo "Startup import passed"
          echo "Migration smoke passed"
          echo "SonarCloud runs as an independent PR check and is not waited on here"
