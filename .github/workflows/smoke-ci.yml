name: Smoke CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/ci_smoke.py"
      - "scripts/smoke_golive.py"
      - "tests/**"
      - ".github/workflows/smoke-ci.yml"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest

    env:
      DEBUG: "false"
      ENVIRONMENT: testing
      DATABASE_URL: sqlite:///./test.db
      JWT_SECRET_KEY: ci-smoke-secret-key-with-more-than-32-characters
      EMAIL_VERIFICATION_REQUIRED: "false"
      BLING_SYNC_SCHEDULER_ENABLED: "false"
      SEFAZ_IMPORTACAO_AUTOMATICA: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -c backend/requirements.lock

      - name: Test smoke helpers
        run: python -m pytest tests -q

      - name: Backend and auth smoke
        run: python scripts/ci_smoke.py

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend core lint (blocking)
        working-directory: frontend
        run: npm run lint:core

      - name: Frontend core format (blocking)
        working-directory: frontend
        run: npm run format:core:check

      - name: Frontend production build
        working-directory: frontend
        run: npm run build
