name: Deploy Safety

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fluxo-unico-safety:
    name: Fluxo unico safety
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate DEV to PROD guardrails
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File scripts/validar_fluxo.ps1
