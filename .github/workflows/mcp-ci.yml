name: MCP CI

on:
  push:
    branches: [main]
    paths:
      - "mcp/**"
      - "scripts/test_mcp.ps1"
      - ".github/workflows/mcp-ci.yml"
  pull_request:
    branches: [main]

jobs:
  mcp-tests:
    name: MCP tests
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Run MCP tests
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\test_mcp.ps1 -InstallDevDependencies
