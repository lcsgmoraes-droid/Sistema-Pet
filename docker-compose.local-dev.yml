# ============================================================================
# 🔵 DOCKER COMPOSE - LOCAL DEV (TESTES)
# ============================================================================
# 
# Para que serve: Desenvolvimento e testes locais
# Porta Postgres: 5433
# Porta Backend: 8000
# Dados: Fictícios/Teste
# 
# COMO USAR:
# docker-compose -f docker-compose.local-dev.yml up -d
# ============================================================================

services:
  # ==========================================================================
  # POSTGRESQL - Banco de dados de DESENVOLVIMENTO
  # ==========================================================================
  postgres:
    image: postgres:16
    container_name: petshop-dev-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=petshop_dev
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petshop_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"  # Mapeado para 5433 no host para compatibilidade

  # ==========================================================================
  # BACKEND - FastAPI + SQLAlchemy
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: petshop-dev-backend
    env_file:
      - path: ./.env.local
        required: false
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - RUNNING_IN_DOCKER=true
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/petshop_dev
      - JWT_SECRET_KEY=dev-secret-key-not-for-production
      - ADMIN_TOKEN=dev_admin_token
      - FRONTEND_URL=http://localhost:5173
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:8000
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - WHATSAPP_ORCHESTRATOR_INTERNAL_TOKEN=${WHATSAPP_ORCHESTRATOR_INTERNAL_TOKEN:-dev_whatsapp_internal_token}
      - WAHA_BASE_URL=http://host.docker.internal:3001
      - WAHA_API_KEY=51d910cdc9f34f989175cf036f868b18
      - BLING_CLIENT_ID=
      - BLING_CLIENT_SECRET=
      - STONE_CLIENT_ID=${STONE_CLIENT_ID:-}
      - STONE_CLIENT_SECRET=${STONE_CLIENT_SECRET:-}
      - STONE_MERCHANT_ID=${STONE_MERCHANT_ID:-}
      - STONE_SANDBOX=${STONE_SANDBOX:-true}
      - RATE_LIMIT_ENABLED=false
      - RATE_LIMIT_PER_MINUTE=1000
      - VET_EVIDENCE_SYNC_ENABLED=true
      - VET_EVIDENCE_SYNC_STARTUP_DELAY_SECONDS=60
      - VET_EVIDENCE_SYNC_INTERVAL_HOURS=168
      - VET_EVIDENCE_SYNC_LIMIT=100
      - VET_REGULATORY_SYNC_ENABLED=true
      - VET_REGULATORY_SYNC_STARTUP_DELAY_SECONDS=120
      - VET_REGULATORY_SYNC_INTERVAL_HOURS=168
      - VET_OPENAI_MODEL=gpt-5.6
      - VET_OPENAI_REASONING_EFFORT=medium
      - LOG_LEVEL=DEBUG
    volumes:
      # Volume para código (hot reload)
      - ./backend:/app
      # Pasta temporária dos documentos do caso para extração no DEV
      - ./Bradesco Will:/app/Bradesco Will:ro
      - /app/__pycache__
    networks:
      - dev-network
      - whatsapp-pilot-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# ==========================================================================
# VOLUMES - Persistência de dados
# ==========================================================================
volumes:
  postgres-dev-data:
    name: petshop-dev-postgres-data

# ==========================================================================
# NETWORKS
# ==========================================================================
networks:
  dev-network:
    name: petshop-dev-network
    driver: bridge
  whatsapp-pilot-network:
    external: true
    name: petshop-whatsapp-pilot-network
