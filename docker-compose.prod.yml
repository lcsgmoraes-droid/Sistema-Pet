services:
  # ========================================
  # POSTGRESQL - BANCO DE DADOS PRODUÇÃO
  # ========================================
  postgres:
    image: postgres:14-alpine
    container_name: petshop-prod-postgres
    restart: always
    environment:
      POSTGRES_DB: petshop_prod
      POSTGRES_USER: petshop_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - petshop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petshop_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # BACKEND - API FASTAPI
  # ========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: petshop-prod-backend
    restart: always
    environment:
      # Database
      DATABASE_URL: postgresql://petshop_admin:${POSTGRES_PASSWORD}@postgres:5432/petshop_prod
      
      # Security
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      
      # Environment
      ENVIRONMENT: production
      DEBUG: "false"
      
      # SQL Audit
      SQL_AUDIT_ENFORCE: "true"
      SQL_AUDIT_ENFORCE_LEVEL: error
      
      # CORS
      ALLOWED_ORIGINS: https://mlprohub.com.br,https://www.mlprohub.com.br
      
      # App
      APP_NAME: "Pet Shop Pro"
      APP_VERSION: "1.1.0"
      
      # Timezone
      TZ: America/Sao_Paulo

      # Bling Integration
      BLING_CLIENT_ID: ${BLING_CLIENT_ID}
      BLING_CLIENT_SECRET: ${BLING_CLIENT_SECRET}
      BLING_ACCESS_TOKEN: ${BLING_ACCESS_TOKEN:-}
      BLING_REFRESH_TOKEN: ${BLING_REFRESH_TOKEN:-}
      BLING_DEPOSITO_ID: ${BLING_DEPOSITO_ID:-14887364871}
      BLING_WEBHOOK_TENANT_ID: ${BLING_WEBHOOK_TENANT_ID:-180d9cbf-5dcb-4676-bf11-dcbd91ed444b}
      WHATSAPP_ORCHESTRATOR_INTERNAL_TOKEN: ${WHATSAPP_ORCHESTRATOR_INTERNAL_TOKEN:-dev_whatsapp_internal_token}
      WHATSAPP_DEFAULT_PROVIDER: ${WHATSAPP_DEFAULT_PROVIDER:-waha}
      WAHA_BASE_URL: ${WAHA_BASE_URL:-http://waha:3000}
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WHATSAPP_360DIALOG_API_KEY: ${WHATSAPP_360DIALOG_API_KEY:-}
      # IA
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Mapas
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      # Imagens de produtos
      PRODUCT_IMAGE_STORAGE_BACKEND: ${PRODUCT_IMAGE_STORAGE_BACKEND:-local}
      PRODUCT_IMAGE_LOCAL_BASE_DIR: ${PRODUCT_IMAGE_LOCAL_BASE_DIR:-uploads/produtos}
      PRODUCT_IMAGE_UPLOAD_MAX_BYTES: ${PRODUCT_IMAGE_UPLOAD_MAX_BYTES:-10485760}
      PRODUCT_IMAGE_MAX_DIMENSION: ${PRODUCT_IMAGE_MAX_DIMENSION:-1600}
      PRODUCT_IMAGE_THUMBNAIL_SIZE: ${PRODUCT_IMAGE_THUMBNAIL_SIZE:-420}
      PRODUCT_IMAGE_WEBP_QUALITY: ${PRODUCT_IMAGE_WEBP_QUALITY:-82}
      PRODUCT_IMAGE_S3_BUCKET: ${PRODUCT_IMAGE_S3_BUCKET:-}
      PRODUCT_IMAGE_S3_REGION: ${PRODUCT_IMAGE_S3_REGION:-}
      PRODUCT_IMAGE_S3_ENDPOINT_URL: ${PRODUCT_IMAGE_S3_ENDPOINT_URL:-}
      PRODUCT_IMAGE_S3_ACCESS_KEY_ID: ${PRODUCT_IMAGE_S3_ACCESS_KEY_ID:-}
      PRODUCT_IMAGE_S3_SECRET_ACCESS_KEY: ${PRODUCT_IMAGE_S3_SECRET_ACCESS_KEY:-}
      PRODUCT_IMAGE_S3_PUBLIC_BASE_URL: ${PRODUCT_IMAGE_S3_PUBLIC_BASE_URL:-}
      PRODUCT_IMAGE_S3_PREFIX: ${PRODUCT_IMAGE_S3_PREFIX:-produtos}
      PRODUCT_IMAGE_S3_USE_PATH_STYLE: ${PRODUCT_IMAGE_S3_USE_PATH_STYLE:-false}
      PRODUCT_IMAGE_S3_PUBLIC_READ: ${PRODUCT_IMAGE_S3_PUBLIC_READ:-false}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data
      - ./backend/secrets:/app/secrets
      - /opt/petshop/.env:/opt/petshop/.env:rw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - petshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # NGINX - REVERSE PROXY
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: petshop-prod-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./backend/uploads:/app/uploads:ro
    depends_on:
      - backend
    networks:
      - petshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  petshop-network:
    driver: bridge
