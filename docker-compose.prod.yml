services:
  # ========================================
  # POSTGRESQL - BANCO DE DADOS PRODUÇÃO
  # ========================================
  postgres:
    image: postgres:14-alpine
    container_name: petshop-prod-postgres
    restart: always
    environment:
      POSTGRES_DB: petshop_prod
      POSTGRES_USER: petshop_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - petshop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petshop_admin -d petshop_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ========================================
  # BACKEND - API FASTAPI
  # ========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: petshop-backend:prod
    container_name: petshop-prod-backend
    restart: always
    environment:
      # Database
      DATABASE_URL: postgresql://petshop_admin:${POSTGRES_PASSWORD}@postgres:5432/petshop_prod
      
      # Security
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      
      # Environment
      ENVIRONMENT: production
      DEBUG: "false"
      
      # SQL Audit
      SQL_AUDIT_ENFORCE: "true"
      SQL_AUDIT_ENFORCE_LEVEL: error
      
      # CORS
      ALLOWED_ORIGINS: https://mlprohub.com.br,https://www.mlprohub.com.br
      
      # App
      APP_NAME: "Pet Shop Pro"
      APP_VERSION: "1.1.0"

      # Backend self-healing / database pool
      SQLALCHEMY_POOL_SIZE: ${SQLALCHEMY_POOL_SIZE:-8}
      SQLALCHEMY_MAX_OVERFLOW: ${SQLALCHEMY_MAX_OVERFLOW:-12}
      SQLALCHEMY_POOL_TIMEOUT: ${SQLALCHEMY_POOL_TIMEOUT:-10}
      SQLALCHEMY_POOL_RECYCLE: ${SQLALCHEMY_POOL_RECYCLE:-1800}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      WATCHDOG_ENABLED: ${WATCHDOG_ENABLED:-true}
      WATCHDOG_URL: ${WATCHDOG_URL:-http://127.0.0.1:8000/health/watchdog}
      WATCHDOG_INTERVAL_SECONDS: ${WATCHDOG_INTERVAL_SECONDS:-15}
      WATCHDOG_TIMEOUT_SECONDS: ${WATCHDOG_TIMEOUT_SECONDS:-6}
      WATCHDOG_FAILURE_THRESHOLD: ${WATCHDOG_FAILURE_THRESHOLD:-4}
      WATCHDOG_STARTUP_GRACE_SECONDS: ${WATCHDOG_STARTUP_GRACE_SECONDS:-90}
      WATCHDOG_RESTART_DELAY_SECONDS: ${WATCHDOG_RESTART_DELAY_SECONDS:-10}
      WATCHDOG_DB_MAX_LATENCY_MS: ${WATCHDOG_DB_MAX_LATENCY_MS:-3000}
      REQUEST_CONTEXT_SLOW_MS: ${REQUEST_CONTEXT_SLOW_MS:-3000}
      REQUEST_LOGGING_SLOW_MS: ${REQUEST_LOGGING_SLOW_MS:-3000}
      ERROR_REPORT_SLOW_REQUEST_MS: ${ERROR_REPORT_SLOW_REQUEST_MS:-3000}
      BLING_SYNC_SCHEDULER_ENABLED: ${BLING_SYNC_SCHEDULER_ENABLED:-false}
      BLING_PEDIDO_WEBHOOK_ASYNC: ${BLING_PEDIDO_WEBHOOK_ASYNC:-true}
      BLING_PEDIDO_WEBHOOK_QUEUE_INTERVAL_SECONDS: ${BLING_PEDIDO_WEBHOOK_QUEUE_INTERVAL_SECONDS:-5}
      BLING_PEDIDO_WEBHOOK_QUEUE_LIMIT: ${BLING_PEDIDO_WEBHOOK_QUEUE_LIMIT:-20}
      BLING_PEDIDO_WEBHOOK_MAX_ATTEMPTS: ${BLING_PEDIDO_WEBHOOK_MAX_ATTEMPTS:-6}
      BLING_PEDIDO_WEBHOOK_FALLBACK_SYNC: ${BLING_PEDIDO_WEBHOOK_FALLBACK_SYNC:-true}
      
      # Timezone
      TZ: America/Sao_Paulo

      # Bling Integration
      BLING_CLIENT_ID: ${BLING_CLIENT_ID}
      BLING_CLIENT_SECRET: ${BLING_CLIENT_SECRET}
      BLING_ACCESS_TOKEN: ${BLING_ACCESS_TOKEN:-}
      BLING_REFRESH_TOKEN: ${BLING_REFRESH_TOKEN:-}
      BLING_DEPOSITO_ID: ${BLING_DEPOSITO_ID:-14887364871}
      BLING_WEBHOOK_TENANT_ID: ${BLING_WEBHOOK_TENANT_ID:-180d9cbf-5dcb-4676-bf11-dcbd91ed444b}
      WHATSAPP_ORCHESTRATOR_INTERNAL_TOKEN: ${WHATSAPP_ORCHESTRATOR_INTERNAL_TOKEN:-dev_whatsapp_internal_token}
      WHATSAPP_DEFAULT_PROVIDER: ${WHATSAPP_DEFAULT_PROVIDER:-waha}
      WAHA_BASE_URL: ${WAHA_BASE_URL:-http://waha:3000}
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WHATSAPP_360DIALOG_API_KEY: ${WHATSAPP_360DIALOG_API_KEY:-}
      # IA
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Mapas
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      # Imagens de produtos
      PRODUCT_IMAGE_STORAGE_BACKEND: ${PRODUCT_IMAGE_STORAGE_BACKEND:-local}
      PRODUCT_IMAGE_LOCAL_BASE_DIR: ${PRODUCT_IMAGE_LOCAL_BASE_DIR:-uploads/produtos}
      PRODUCT_IMAGE_UPLOAD_MAX_BYTES: ${PRODUCT_IMAGE_UPLOAD_MAX_BYTES:-10485760}
      PRODUCT_IMAGE_MAX_DIMENSION: ${PRODUCT_IMAGE_MAX_DIMENSION:-1600}
      PRODUCT_IMAGE_THUMBNAIL_SIZE: ${PRODUCT_IMAGE_THUMBNAIL_SIZE:-420}
      PRODUCT_IMAGE_WEBP_QUALITY: ${PRODUCT_IMAGE_WEBP_QUALITY:-82}
      PRODUCT_IMAGE_S3_BUCKET: ${PRODUCT_IMAGE_S3_BUCKET:-}
      PRODUCT_IMAGE_S3_REGION: ${PRODUCT_IMAGE_S3_REGION:-}
      PRODUCT_IMAGE_S3_ENDPOINT_URL: ${PRODUCT_IMAGE_S3_ENDPOINT_URL:-}
      PRODUCT_IMAGE_S3_ACCESS_KEY_ID: ${PRODUCT_IMAGE_S3_ACCESS_KEY_ID:-}
      PRODUCT_IMAGE_S3_SECRET_ACCESS_KEY: ${PRODUCT_IMAGE_S3_SECRET_ACCESS_KEY:-}
      PRODUCT_IMAGE_S3_PUBLIC_BASE_URL: ${PRODUCT_IMAGE_S3_PUBLIC_BASE_URL:-}
      PRODUCT_IMAGE_S3_PREFIX: ${PRODUCT_IMAGE_S3_PREFIX:-produtos}
      PRODUCT_IMAGE_S3_USE_PATH_STYLE: ${PRODUCT_IMAGE_S3_USE_PATH_STYLE:-false}
      PRODUCT_IMAGE_S3_PUBLIC_READ: ${PRODUCT_IMAGE_S3_PUBLIC_READ:-false}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data
      - ./backend/secrets:/app/secrets
      - /opt/petshop/.env:/opt/petshop/.env:rw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - petshop-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "7", "http://localhost:8000/health/watchdog"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ========================================
  # WORKER BLING - JOBS E RECONCILIACOES
  # ========================================
  worker-bling:
    image: petshop-backend:prod
    container_name: petshop-prod-worker-bling
    restart: always
    command: ["python", "scripts/run_bling_worker.py"]
    environment:
      DATABASE_URL: postgresql://petshop_admin:${POSTGRES_PASSWORD}@postgres:5432/petshop_prod
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ENVIRONMENT: production
      DEBUG: "false"
      SQL_AUDIT_ENFORCE: "true"
      SQL_AUDIT_ENFORCE_LEVEL: error
      SQLALCHEMY_POOL_SIZE: ${BLING_WORKER_SQLALCHEMY_POOL_SIZE:-3}
      SQLALCHEMY_MAX_OVERFLOW: ${BLING_WORKER_SQLALCHEMY_MAX_OVERFLOW:-4}
      SQLALCHEMY_POOL_TIMEOUT: ${SQLALCHEMY_POOL_TIMEOUT:-10}
      SQLALCHEMY_POOL_RECYCLE: ${SQLALCHEMY_POOL_RECYCLE:-1800}
      BLING_SYNC_SCHEDULER_ENABLED: "true"
      BLING_PEDIDO_WEBHOOK_QUEUE_INTERVAL_SECONDS: ${BLING_PEDIDO_WEBHOOK_QUEUE_INTERVAL_SECONDS:-5}
      BLING_PEDIDO_WEBHOOK_QUEUE_LIMIT: ${BLING_PEDIDO_WEBHOOK_QUEUE_LIMIT:-20}
      BLING_PEDIDO_WEBHOOK_MAX_ATTEMPTS: ${BLING_PEDIDO_WEBHOOK_MAX_ATTEMPTS:-6}
      BLING_CLIENT_ID: ${BLING_CLIENT_ID}
      BLING_CLIENT_SECRET: ${BLING_CLIENT_SECRET}
      BLING_ACCESS_TOKEN: ${BLING_ACCESS_TOKEN:-}
      BLING_REFRESH_TOKEN: ${BLING_REFRESH_TOKEN:-}
      BLING_DEPOSITO_ID: ${BLING_DEPOSITO_ID:-14887364871}
      BLING_WEBHOOK_TENANT_ID: ${BLING_WEBHOOK_TENANT_ID:-180d9cbf-5dcb-4676-bf11-dcbd91ed444b}
      WHATSAPP_ORCHESTRATOR_INTERNAL_TOKEN: ${WHATSAPP_ORCHESTRATOR_INTERNAL_TOKEN:-dev_whatsapp_internal_token}
      WHATSAPP_DEFAULT_PROVIDER: ${WHATSAPP_DEFAULT_PROVIDER:-waha}
      WAHA_BASE_URL: ${WAHA_BASE_URL:-http://waha:3000}
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      TZ: America/Sao_Paulo
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data
      - ./backend/secrets:/app/secrets
      - /opt/petshop/.env:/opt/petshop/.env:rw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - petshop-network
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/bling_worker_heartbeat && find /tmp/bling_worker_heartbeat -mmin -2 | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ========================================
  # NGINX - REVERSE PROXY
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: petshop-prod-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./runtime/frontend/dist:/usr/share/nginx/html:ro
      - ./backend/uploads:/app/uploads:ro
    depends_on:
      - backend
    networks:
      - petshop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  petshop-network:
    driver: bridge
